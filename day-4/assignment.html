<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyBoard Assignment</title>
    <style>
        .container {
            display : flex;
            justify-content : center;
            align-items : center;
            flex-direction : column;
            padding: 30px;
            background: linear-gradient(to bottom right, #3b75a7, #4159d1);
             gap: 10px; 
             border : 1px solid #000;
           box-shadow: rgba(0, 0, 0, 0.09) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px;
        }
        .row{
            display:flex;
            gap:5px;
            }
        h1{
            color:rgb(148, 7, 54);
        }
        
        .key{
            width: 65px;
            height: 65px;
            background-color : rgb(255, 255, 255);
            justify-content : center;
            align-items : center;
            display : flex;
            border-radius : 5px;

            box-shadow: rgba(0, 0, 0, 0.17) 0px -23px 25px 0px inset, rgba(0, 0, 0, 0.15) 0px -36px 30px 0px inset, rgba(0, 0, 0, 0.1) 0px -79px 40px 0px inset, rgba(0, 0, 0, 0.06) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px;
        }
        .wide{
            width:110px;
        }   

        .extra-wide{
             width:160px;
        }

        .space{
             width:375px;
        }

    </style>
</head>
<body>
    <div class ="container">
        <h1>KEYBOARD</h1>
         

        <div class="row">
             <div class="key">Esc</div>
             <div class="key">F1</div>
             <div class="key">F2</div>
             <div class="key">F3</div>
             <div class="key">F4</div>
             <div class="key">F5</div>
             <div class="key">F6</div>
             <div class="key">F7</div>
             <div class="key">F8</div>
             <div class="key">F9</div>
             <div class="key">F10</div>
             <div class="key">F11</div>
             <div class="key">F12</div>
             <div class="key wide">Insert</div>
             <div class="key extra-wide">PrintScr</div>
             <div class="key wide">Delete</div>
        </div>
        <div class="row">
             <div class="key">~</div>
             <div class="key">1</div>
             <div class="key">2</div>
             <div class="key">3</div>
             <div class="key">4</div>
             <div class="key">5</div>
             <div class="key">6</div>
             <div class="key">7</div>
             <div class="key">8</div>
             <div class="key">9</div>
             <div class="key">0</div>
             <div class="key">-</div>
             <div class="key">=</div>
             <div class="key extra-wide">Backspace</div>
             <div class="key wide">Home</div>
        </div>
        <div class="row">
             <div class="key extra-wide">Tab</div>
             <div class="key">Q</div>
             <div class="key">W</div>
             <div class="key">E</div>
             <div class="key">R</div>
             <div class="key">T</div>
             <div class="key">Y</div>
             <div class="key">U</div>
             <div class="key">I</div>
             <div class="key">O</div>
             <div class="key">P</div>
             <div class="key">{</div>
             <div class="key">}</div>
             <div class="key">\</div>
             <div class="key">Pg Up</div>
        </div>
        <div class="row">
             <div class="key extra-wide">Caps Lock</div>
             <div class="key">A</div>
             <div class="key">S</div>
             <div class="key">D</div>
             <div class="key">F</div>
             <div class="key">G</div>
             <div class="key">H</div>
             <div class="key">J</div>
             <div class="key">K</div>
             <div class="key">L</div>
             <div class="key">;</div>
             <div class="key">"</div>
             <div class="key extra-wide">Enter</div>
             <div class="key">Pg Dn</div>
        </div>
        <div class="row">
             <div class="key extra-wide">Shift</div>
             <div class="key">Z</div>
             <div class="key">X</div>
             <div class="key">C</div>
             <div class="key">V</div>
             <div class="key">B</div>
             <div class="key">N</div>
             <div class="key">M</div>
             <div class="key"><</div>
             <div class="key">></div>
             <div class="key">?</div>
             <div class="key extra-wide">Shift</div>
             <div class="key">↑</div>
             <div class="key">End</div>
        </div>
        <div class="row">
             <div class="key">Ctrl</div>
             <div class="key">Fn</div>
             <div class="key">Win</div>
             <div class="key">Alt</div>
             <div class="key space"></div>
             <div class="key">Alt</div>
             <div class="key wide">Fn</div>
             <div class="key wide">Ctrl</div>
             <div class="key">←</div>
             <div class="key">↓</div>
             <div class="key">→</div>
        </div>


    </div>
   
    
</body>
</html>
